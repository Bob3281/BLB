<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ηλιοτρόπια που Φυτρώνουν</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(to bottom, #1a052e, #0b0214);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        canvas {
            display: block;
        }
        #restartBtn {
            position: absolute;
            bottom: 30px;
            padding: 12px 24px;
            background-color: #ffcc00;
            border: none;
            border-radius: 25px;
            color: #111;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            font-family: sans-serif;
            box-shadow: 0 4px 15px rgba(255, 204, 0, 0.4);
            transition: transform 0.2s, background-color 0.2s;
            -webkit-tap-highlight-color: transparent;
            z-index: 10;
        }
        #restartBtn:hover {
            transform: scale(1.05);
            background-color: #ffe066;
        }
        #restartBtn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <canvas id="flowerCanvas"></canvas>
    <button id="restartBtn" onclick="initAnimation()">Ηλιαχτιδα μου</button>

    <script>
        const canvas = document.getElementById('flowerCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', () => {
            resizeCanvas();
            initAnimation();
        });
        resizeCanvas();

        let flowers = [];

        class Sunflower {
            constructor(x, y, delay) {
                this.startX = x;
                this.startY = y;
                this.currentX = x;
                this.currentY = y;
                this.delay = delay; // Καθυστέρηση για να μην φυτρώνουν όλα μαζί
                
                // Ύψος ασφαλείας για να μην βγαίνουν ποτέ εκτός οθόνης
                const maxPossibleLength = canvas.height * 0.38; 
                this.targetLength = maxPossibleLength * (0.6 + Math.random() * 0.4);
                
                // Ελεγχόμενη γωνία εξάπλωσης για να μένουν μέσα στα πλαϊνά όρια
                this.angle = -Math.PI / 2 + (Math.random() - 0.5) * 0.45; 
                this.currentLength = 0;
                this.growthSpeed = 1.8 + Math.random() * 1.5;
                
                this.flowerSize = 0;
                // Ιδανικό μέγεθος για να χωράνε πολλά λουλούδια μαζί
                const baseSize = Math.min(canvas.width * 0.045, 25);
                this.targetFlowerSize = baseSize + Math.random() * (baseSize * 0.3);
                this.isDoneGrowingStem = false;
                
                this.points = [{x: this.startX, y: this.startY}];
            }

            update() {
                // Αν υπάρχει ακόμα καθυστέρηση, μείωσέ την και μην αναπτυχθείς ακόμα
                if (this.delay > 0) {
                    this.delay--;
                    return;
                }

                if (!this.isDoneGrowingStem) {
                    this.currentLength += this.growthSpeed;
                    
                    let curve = Math.sin(this.currentLength * 0.02) * 0.35;
                    this.currentX = this.startX + Math.cos(this.angle + curve) * this.currentLength;
                    this.currentY = this.startY + Math.sin(this.angle + curve) * this.currentLength;
                    
                    // Απόλυτη ασφάλεια για τα πλαϊνά όρια της οθόνης
                    const margin = this.targetFlowerSize * 1.2;
                    if (this.currentX < margin) this.currentX = margin;
                    if (this.currentX > canvas.width - margin) this.currentX = canvas.width - margin;

                    this.points.push({x: this.currentX, y: this.currentY});

                    if (this.currentLength >= this.targetLength) {
                        this.isDoneGrowingStem = true;
                    }
                } else if (this.flowerSize < this.targetFlowerSize) {
                    this.flowerSize += 0.5;
                }
            }

            draw() {
                // Μην σχεδιάζεις το λουλούδι αν δεν έχει ξεκινήσει να φυτρώνει
                if (this.delay > 0) return;

                // 1. Μίσχος
                ctx.beginPath();
                ctx.moveTo(this.points[0].x, this.points[0].y);
                for (let i = 1; i < this.points.length; i++) {
                    ctx.lineTo(this.points[i].x, this.points[i].y);
                }
                ctx.strokeStyle = '#2d5a27';
                ctx.lineWidth = Math.max(2, canvas.width * 0.005); 
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.stroke();

                // 2. Ανθός
                if (this.flowerSize > 0) {
                    const fx = this.currentX;
                    const fy = this.currentY;
                    const petalCount = 12;
                    
                    // Πέταλα
                    ctx.fillStyle = '#ffcc00';
                    for (let i = 0; i < petalCount; i++) {
                        ctx.beginPath();
                        let petalAngle = (i * Math.PI * 2) / petalCount;
                        let px = fx + Math.cos(petalAngle) * this.flowerSize;
                        let py = fy + Math.sin(petalAngle) * this.flowerSize;
                        ctx.arc(px, py, this.flowerSize * 0.45, 0, Math.PI * 2);
                        ctx.fill();
                    }

                    // Κέντρο
                    ctx.beginPath();
                    ctx.arc(fx, fy, this.flowerSize * 0.6, 0, Math.PI * 2);
                    ctx.fillStyle = '#4a2c00';
                    ctx.fill();
                    
                    ctx.beginPath();
                    ctx.arc(fx, fy, this.flowerSize * 0.45, 0, Math.PI * 2);
                    ctx.strokeStyle = '#362000';
                    ctx.lineWidth = 1;
                    ctx.stroke();
                }
            }
        }

        function initAnimation() {
            flowers = [];
            const startX = canvas.width / 2;
            const startY = canvas.height - 90; 

            // Δημιουργία 24 ηλιοτροπίων με κλιμακωτή καθυστέρηση (0 έως 90 frames)
            for (let i = 0; i < 24; i++) {
                let randomDelay = Math.random() * 90; 
                flowers.push(new Sunflower(startX, startY, randomDelay));
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Βάση / Χώμα
            ctx.beginPath();
            ctx.arc(canvas.width / 2, canvas.height + 20, Math.min(canvas.width * 0.22, 100), 0, Math.PI * 2);
            ctx.fillStyle = '#3e2723';
            ctx.fill();

            flowers.forEach(flower => {
                flower.update();
                flower.draw();
            });

            requestAnimationFrame(animate);
        }

        initAnimation();
        animate();
    </script>
</body>
</html>
