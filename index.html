<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ηλιοτρόπια που Φυτρώνουν</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(to bottom, #1a052e, #0b0214);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        canvas {
            display: block;
        }
        #restartBtn {
            position: absolute;
            bottom: 30px;
            padding: 12px 24px;
            background-color: #ffcc00;
            border: none;
            border-radius: 25px;
            color: #111;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            font-family: sans-serif;
            box-shadow: 0 4px 15px rgba(255, 204, 0, 0.4);
            transition: transform 0.2s, background-color 0.2s;
            -webkit-tap-highlight-color: transparent;
            z-index: 10;
        }
        #restartBtn:hover {
            transform: scale(1.05);
            background-color: #ffe066;
        }
        #restartBtn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <canvas id="flowerCanvas"></canvas>
    <button id="restartBtn" onclick="initAnimation()">Ηλιαχτιδα μου</button>

    <script>
        const canvas = document.getElementById('flowerCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', () => {
            resizeCanvas();
            initAnimation();
        });
        resizeCanvas();

        let flowers = [];

        class Sunflower {
            constructor(x, y) {
                this.startX = x;
                this.startY = y;
                this.currentX = x;
                this.currentY = y;
                
                // Αυστηρός περιορισμός ύψους: έως 38% της οθόνης για να μην βγαίνει ποτέ πάνω
                const maxPossibleLength = canvas.height * 0.38; 
                this.targetLength = maxPossibleLength * (0.7 + Math.random() * 0.3);
                
                // Πιο στενή γωνία εξάπλωσης (0.4 αντί για 0.5) για να μην βγαίνουν ποτέ αριστερά/δεξιά στα κινητά
                this.angle = -Math.PI / 2 + (Math.random() - 0.5) * 0.4; 
                this.currentLength = 0;
                this.growthSpeed = 1.5 + Math.random() * 1.5;
                
                this.flowerSize = 0;
                // Μικρότερο μέγεθος ανθού για να χωράνε πολλά λουλούδια χωρίς να κρύβουν το ένα το άλλο
                const baseSize = Math.min(canvas.width * 0.05, 30);
                this.targetFlowerSize = baseSize + Math.random() * (baseSize * 0.25);
                this.isDoneGrowingStem = false;
                
                this.points = [{x: this.startX, y: this.startY}];
            }

            update() {
                if (!this.isDoneGrowingStem) {
                    this.currentLength += this.growthSpeed;
                    
                    // Ελεγχόμενη καμπύλη μίσχου
                    let curve = Math.sin(this.currentLength * 0.02) * 0.3;
                    this.currentX = this.startX + Math.cos(this.angle + curve) * this.currentLength;
                    this.currentY = this.startY + Math.sin(this.angle + curve) * this.currentLength;
                    
                    // Ασφάλεια: Κρατάει τα λουλούδια μέσα στα όρια του πλάτους του canvas
                    const margin = this.targetFlowerSize * 1.5;
                    if (this.currentX < margin) this.currentX = margin;
                    if (this.currentX > canvas.width - margin) this.currentX = canvas.width - margin;

                    this.points.push({x: this.currentX, y: this.currentY});

                    if (this.currentLength >= this.targetLength) {
                        this.isDoneGrowingStem = true;
                    }
                } else if (this.flowerSize < this.targetFlowerSize) {
                    this.flowerSize += 0.4;
                }
            }

            draw() {
                // 1. Μίσχος
                ctx.beginPath();
                ctx.moveTo(this.points[0].x, this.points[0].y);
                for (let i = 1; i < this.points.length; i++) {
                    ctx.lineTo(this.points[i].x, this.points[i].y);
                }
                ctx.strokeStyle = '#2d5a27';
                ctx.lineWidth = Math.max(2.5, canvas.width * 0.006); 
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.stroke();

                // 2. Ανθός
                if (this.flowerSize > 0) {
                    const fx = this.currentX;
                    const fy = this.currentY;
                    const petalCount = 12;
                    
                    // Πέταλα
                    ctx.fillStyle = '#ffcc00';
                    for (let i = 0; i < petalCount; i++) {
                        ctx.beginPath();
                        let petalAngle = (i * Math.PI * 2) / petalCount;
                        let px = fx + Math.cos(petalAngle) * this.flowerSize;
                        let py = fy + Math.sin(petalAngle) * this.flowerSize;
                        ctx.arc(px, py, this.flowerSize * 0.45, 0, Math.PI * 2);
                        ctx.fill();
                    }

                    // Κέντρο
                    ctx.beginPath();
                    ctx.arc(fx, fy, this.flowerSize * 0.6, 0, Math.PI * 2);
                    ctx.fillStyle = '#4a2c00';
                    ctx.fill();
                    
                    ctx.beginPath();
                    ctx.arc(fx, fy, this.flowerSize * 0.45, 0, Math.PI * 2);
                    ctx.strokeStyle = '#362000';
                    ctx.lineWidth = 1;
                    ctx.stroke();
                }
            }
        }

        function initAnimation() {
            flowers = [];
            const startX = canvas.width / 2;
            const startY = canvas.height - 90; 

            // Αυξήθηκε ο αριθμός σε 12 ηλιοτρόπια για πιο πλούσιο εφέ
            for (let i = 0; i < 12; i++) {
                flowers.push(new Sunflower(startX, startY));
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Βάση / Χώμα
            ctx.beginPath();
            ctx.arc(canvas.width / 2, canvas.height + 20, Math.min(canvas.width * 0.22, 100), 0, Math.PI * 2);
            ctx.fillStyle = '#3e2723';
            ctx.fill();

            flowers.forEach(flower => {
                flower.update();
                flower.draw();
            });

            requestAnimationFrame(animate);
        }

        initAnimation();
        animate();
    </script>
</body>
</html>
