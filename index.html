<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>8 Μεγάλα Ηλιοτρόπια Μπουκέτο</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(to bottom, #1a052e, #0b0214);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
        }
        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        #restartBtn {
            position: absolute;
            bottom: 4%;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 28px;
            background-color: #ffcc00;
            border: none;
            border-radius: 25px;
            color: #111;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            font-family: sans-serif;
            box-shadow: 0 4px 15px rgba(255, 204, 0, 0.4);
            transition: transform 0.2s, background-color 0.2s;
            -webkit-tap-highlight-color: transparent;
            z-index: 10;
        }
        #restartBtn:hover {
            transform: translateX(-50%) scale(1.05);
            background-color: #ffe066;
        }
        #restartBtn:active {
            transform: translateX(-50%) scale(0.95);
        }
    </style>
</head>
<body>

    <canvas id="flowerCanvas"></canvas>
    <button id="restartBtn" onclick="initAnimation()">Ηλιαχτιδα μου</button>

    <script>
        const canvas = document.getElementById('flowerCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', () => {
            resizeCanvas();
            initAnimation();
        });
        resizeCanvas();

        let flowers = [];
        let baseHandY = 0;

        class Sunflower {
            constructor(x, y, delay, index) {
                this.startX = x;
                this.startY = y;
                this.currentX = x;
                this.currentY = y;
                this.delay = delay;
                
                // Ύψος μίσχων για να φτάνουν κοντά στην κορυφή
                const maxPossibleLength = canvas.height * 0.52; 
                this.targetLength = maxPossibleLength * (0.85 + Math.random() * 0.15);
                
                // Μεγάλη απόσταση και άπλωμα των 8 λουλουδιών
                const totalFlowers = 8;
                const spreadRange = 1.4; 
                this.angle = -Math.PI / 2 + ((index / (totalFlowers - 1)) - 0.5) * spreadRange;
                
                this.currentLength = 0;
                this.growthSpeed = 2.5 + Math.random() * 1.5;
                
                this.flowerSize = 0;
                const baseSize = Math.min(canvas.width * 0.08, 42);
                this.targetFlowerSize = baseSize + Math.random() * (baseSize * 0.2);
                this.isDoneGrowingStem = false;
                
                this.points = [{x: this.startX, y: this.startY}];
            }

            update() {
                if (this.delay > 0) {
                    this.delay--;
                    return;
                }

                if (!this.isDoneGrowingStem) {
                    this.currentLength += this.growthSpeed;
                    
                    let curve = Math.sin(this.currentLength * 0.015) * 0.15;
                    this.currentX = this.startX + Math.cos(this.angle + curve) * this.currentLength;
                    this.currentY = this.startY + Math.sin(this.angle + curve) * this.currentLength;
                    
                    // Όρια ασφαλείας οθόνης
                    const margin = this.targetFlowerSize * 1.3;
                    if (this.currentX < margin) this.currentX = margin;
                    if (this.currentX > canvas.width - margin) this.currentX = canvas.width - margin;
                    if (this.currentY < margin) this.currentY = margin;

                    this.points.push({x: this.currentX, y: this.currentY});

                    if (this.currentLength >= this.targetLength) {
                        this.isDoneGrowingStem = true;
                    }
                } else if (this.flowerSize < this.targetFlowerSize) {
                    this.flowerSize += 0.6;
                }
            }

            draw() {
                if (this.delay > 0) return;

                // 1. Μίσχος (Διορθώθηκε το σφάλμα με τα points)
                if (this.points.length > 0) {
                    ctx.beginPath();
                    ctx.moveTo(this.points[0].x, this.points[0].y);
                    for (let i = 1; i < this.points.length; i++) {
                        ctx.lineTo(this.points[i].x, this.points[i].y);
                    }
                    ctx.strokeStyle = '#2d5a27';
                    ctx.lineWidth = Math.max(3.5, canvas.width * 0.007);
                    ctx.lineCap = 'round';
                    ctx.lineJoin = 'round';
                    ctx.stroke();
                }

                // 2. Ανθός
                if (this.flowerSize > 0) {
                    const fx = this.currentX;
                    const fy = this.currentY;
                    const petalCount = 16;
                    
                    ctx.fillStyle = '#e6b800';
                    for (let i = 0; i < petalCount; i++) {
                        ctx.beginPath();
                        let petalAngle = (i * Math.PI * 2) / petalCount + 0.1;
                        let px = fx + Math.cos(petalAngle) * (this.flowerSize * 1.05);
                        let py = fy + Math.sin(petalAngle) * (this.flowerSize * 1.05);
                        ctx.arc(px, py, this.flowerSize * 0.45, 0, Math.PI * 2);
                        ctx.fill();
                    }
                    
                    ctx.fillStyle = '#ffcc00';
                    for (let i = 0; i < petalCount; i++) {
                        ctx.beginPath();
                        let petalAngle = (i * Math.PI * 2) / petalCount;
                        let px = fx + Math.cos(petalAngle) * this.flowerSize;
                        let py = fy + Math.sin(petalAngle) * this.flowerSize;
                        ctx.arc(px, py, this.flowerSize * 0.42, 0, Math.PI * 2);
                        ctx.fill();
                    }

                    ctx.beginPath();
                    ctx.arc(fx, fy, this.flowerSize * 0.6, 0, Math.PI * 2);
                    ctx.fillStyle = '#4a2c00';
                    ctx.fill();
                    
                    ctx.beginPath();
                    ctx.arc(fx, fy, this.flowerSize * 0.45, 0, Math.PI * 2);
                    ctx.strokeStyle = '#362000';
                    ctx.lineWidth = 1;
                    ctx.stroke();
                }
            }
        }

        // Μεγάλη γροθιά, κοντό χέρι
        function drawFist(hx, hy) {
            ctx.save();
            ctx.fillStyle = '#ffdbac';
            ctx.strokeStyle = '#e0a875';
            ctx.lineWidth = 3.5;

            ctx.beginPath();
            ctx.arc(hx, hy + 12, 32, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();

            for (let i = 0; i < 4; i++) {
                ctx.beginPath();
                ctx.arc(hx - 8, hy - 18 + (i * 15), 11, 0, Math.PI * 2);
                ctx.fill();
                ctx.stroke();
            }

            ctx.beginPath();
            ctx.arc(hx + 16, hy + 5, 11, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();

            ctx.beginPath();
            ctx.rect(hx - 15, hy + 40, 30, 45);
            ctx.fill();
            
            ctx.beginPath();
            ctx.moveTo(hx - 15, hy + 40);
            ctx.lineTo(hx - 15, hy + 85);
            ctx.moveTo(hx + 15, hy + 40);
            ctx.lineTo(hx + 15, hy + 85);
            ctx.stroke();

            ctx.restore();
        }

        function drawStemsBelow(hx, hy) {
            ctx.save();
            ctx.strokeStyle = '#2d5a27';
            ctx.lineWidth = 4;
            for (let i = -2; i <= 2; i++) {
                ctx.beginPath();
                ctx.moveTo(hx + i * 5, hy + 30);
                ctx.lineTo(hx + i * 10, hy + 80);
                ctx.stroke();
            }
            ctx.restore();
        }

        function initAnimation() {
            flowers = [];
            baseHandY = canvas.height * 0.80; 
            const startX = canvas.width / 2;

            for (let i = 0; i < 8; i++) {
                let delay = i * 15; 
                flowers.push(new Sunflower(startX, baseHandY + 15, delay, i));
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const hx = canvas.width / 2;
            const hy = baseHandY;

            drawStemsBelow(hx, hy);

            flowers.forEach(flower => {
                flower.update();
                flower.draw();
            });

            drawFist(hx, hy);

            requestAnimationFrame(animate);
        }

        initAnimation();
        animate();
    </script>
</body>
</html>
