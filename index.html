<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ηλιοτρόπια που Φυτρώνουν</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-style: border-box;
        }
        body {
            background: linear-gradient(to bottom, #1a052e, #0b0214);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        canvas {
            display: block;
        }
        #restartBtn {
            position: absolute;
            bottom: 20px;
            padding: 10px 20px;
            background-color: #ffcc00;
            border: none;
            border-radius: 5px;
            color: #111;
            font-weight: bold;
            cursor: pointer;
            font-family: sans-serif;
            transition: transform 0.2s;
        }
        #restartBtn:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <canvas id="flowerCanvas"></canvas>
    <button id="restartBtn" onclick="initAnimation()">Ξανά από την αρχή</button>

    <script>
        const canvas = document.getElementById('flowerCanvas');
        const ctx = canvas.getContext('2d');

        // Προσαρμογή μεγέθους canvas στην οθόνη
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        let flowers = [];
        const startX = canvas.width / 2;
        const startY = canvas.height - 50;

        class Sunflower {
            constructor(x, y) {
                this.startX = x;
                this.startY = y;
                this.currentX = x;
                this.currentY = y;
                
                // Τυχαίες γωνίες και μήκη για φυσική κίνηση
                this.angle = -Math.PI / 2 + (Math.random() - 0.5) * 0.6; 
                this.targetLength = 250 + Math.random() * 150;
                this.currentLength = 0;
                this.growthSpeed = 2 + Math.random() * 2;
                
                this.flowerSize = 0;
                this.targetFlowerSize = 35 + Math.random() * 15;
                this.isDoneGrowingStem = false;
                
                // Αποθήκευση σημείων για το λύγισμα του μίσχου
                this.points = [{x: this.startX, y: this.startY}];
            }

            update() {
                if (!this.isDoneGrowingStem) {
                    this.currentLength += this.growthSpeed;
                    
                    // Δημιουργία ελαφριάς καμπύλης στον μίσχο
                    let curve = Math.sin(this.currentLength * 0.02) * 0.5;
                    this.currentX = this.startX + Math.cos(this.angle + curve) * this.currentLength;
                    this.currentY = this.startY + Math.sin(this.angle + curve) * this.currentLength;
                    
                    this.points.push({x: this.currentX, y: this.currentY});

                    if (this.currentLength >= this.targetLength) {
                        this.isDoneGrowingStem = true;
                    }
                } else if (this.flowerSize < this.targetFlowerSize) {
                    // Ανάπτυξη του ανθού αφού μεγαλώσει ο μίσχος
                    this.flowerSize += 0.5;
                }
            }

            draw() {
                // 1. Σχεδίαση Μίσχου (Πράσινο κοτσάνι)
                ctx.beginPath();
                ctx.moveTo(this.points[0].x, this.points[0].y);
                for (let i = 1; i < this.points.length; i++) {
                    ctx.lineTo(this.points[i].x, this.points[i].y);
                }
                ctx.strokeStyle = '#2d5a27';
                ctx.lineWidth = 6;
                ctx.lineCap = 'round';
                ctx.stroke();

                // 2. Σχεδίαση Ανθού (Ηλιοτρόπιο)
                if (this.flowerSize > 0) {
                    const fx = this.currentX;
                    const fy = this.currentY;

                    // Σχεδίαση Πετάλων (Κίτρινο)
                    const petalCount = 16;
                    ctx.fillStyle = '#ffcc00';
                    for (let i = 0; i < petalCount; i++) {
                        ctx.beginPath();
                        let petalAngle = (i * Math.PI * 2) / petalCount;
                        let px = fx + Math.cos(petalAngle) * this.flowerSize;
                        let py = fy + Math.sin(petalAngle) * this.flowerSize;
                        ctx.arc(px, py, this.flowerSize * 0.4, 0, Math.PI * 2);
                        ctx.fill();
                    }

                    // Σχεδίαση Κέντρου (Καφέ)
                    ctx.beginPath();
                    ctx.arc(fx, fy, this.flowerSize * 0.6, 0, Math.PI * 2);
                    ctx.fillStyle = '#4a2c00';
                    ctx.fill();
                    
                    // Μικρή λεπτομέρεια στο κέντρο
                    ctx.beginPath();
                    ctx.arc(fx, fy, this.flowerSize * 0.5, 0, Math.PI * 2);
                    ctx.strokeStyle = '#362000';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                }
            }
        }

        function initAnimation() {
            flowers = [];
            resizeCanvas();
            // Δημιουργία 6 ηλιοτροπίων από το ίδιο σημείο βάσης
            for (let i = 0; i < 6; i++) {
                flowers.push(new Sunflower(canvas.width / 2, canvas.height - 20));
            }
        }

        function animate() {
            // Καθαρισμός canvas με ελαφρύ opacity για εφέ κίνησης αν χρειαστεί
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Σχεδίαση "χώματος" / βάσης
            ctx.beginPath();
            ctx.arc(canvas.width / 2, canvas.height + 100, 130, 0, Math.PI * 2);
            ctx.fillStyle = '#3e2723';
            ctx.fill();

            // Ενημέρωση και σχεδίαση κάθε λουλουδιού
            flowers.forEach(flower => {
                flower.update();
                flower.draw();
            });

            requestAnimationFrame(animate);
        }

        // Εκκίνηση
        initAnimation();
        animate();
    </script>
</body>
</html>
